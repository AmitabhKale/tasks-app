pipeline:
  name: task-react-demo
  identifier: taskreactdemo
  projectIdentifier: Taskapp
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: GKEtaskconnector
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry
                  identifier: BuildAndPushDockerRegistry
                  spec:
                    connectorRef: dockeramitabhregistry
                    repo: task-tracker
                    tags:
                      - latest
  properties:
    ci:
      codebase:
        connectorRef: Amitabh
        repoName: tasks-app
        build: <+input>
